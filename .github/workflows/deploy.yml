name: Deploy

# Build the game site from game/ via rzk-game-action (which fetches the pinned
# rzk-game engine + bundler, needing no Haskell toolchain here) and publish it to
# GitHub Pages. Runs on push to main; PRs build but do not deploy.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # for peaceiris/actions-gh-pages to push to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🎮 Bundle and assemble the site
        uses: rzk-lang/rzk-game-action@v1
        with:
          game: game/game.yaml
          engine-version: v0.3.1

      - name: 🚀 Deploy to GitHub Pages (gh-pages)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
