<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rzk Game</title>
  <!-- Self-hosted KaTeX + marked for Markdown/TeX prose (see prose.js). These
       regular scripts run before the deferred app module, so globalThis.renderProse
       is defined by the time the wasm app loads a level. -->
  <link rel="stylesheet" href="vendor/katex/katex.min.css">
  <script src="vendor/katex/katex.min.js"></script>
  <script src="vendor/marked/marked.min.js"></script>
  <script src="prose.js"></script>
  <!-- Progress export/import helpers (download, pickImport); see Main.hs. -->
  <script src="download.js"></script>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif;
           max-width: 760px; margin: 1rem auto; padding: 0 1rem; }
    /* Prose is set in a clean sans-serif for on-screen readability; math is
       rendered separately by KaTeX in its own fonts, so the prose font needs no
       math glyph coverage. Code, panels, and buttons keep their own fonts. */
    h1, h2, h3, p, summary, .nav-current {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    /* Markdown/TeX prose (rendered to HTML by prose.js, injected as innerHTML). */
    .prose > :first-child { margin-top: 0; }
    .prose > :last-child { margin-bottom: 0; }
    .prose code { font-family: ui-monospace, monospace; font-size: .9em;
                  background: #f0f0f0; padding: .05rem .25rem; border-radius: 3px; }
    /* A fenced ```rzk block (e.g. a "Useful here" lemma list) is a <pre><code>;
       drop the inline-code chrome so only the <pre> box shows. */
    .prose pre code { background: none; padding: 0; border-radius: 0;
                      font-size: .85rem; }
    .prose .katex-display { margin: .5rem 0; }
    /* The conclusion prose is always in the DOM (injected by id) and revealed
       only once the level is solved. */
    .concl.hidden { display: none; }
    .concl.shown { margin: .4rem 0 0; padding: .6rem; background: #eef7ee;
                   border: 1px solid #cfe6cf; border-radius: 6px; }
    header.game { border-bottom: 1px solid #eee; margin-bottom: 1rem;
                  padding-bottom: .5rem; }
    header.game h1 { margin: 0; font-size: 1.5rem; }
    header.game .tagline { margin: .2rem 0 0; color: #777; font-size: .9rem; }
    h2 { margin-bottom: .2rem; }
    h3 { margin: 1rem 0 .3rem; font-size: 1rem; color: #444; }
    pre { background: #f5f5f5; padding: .6rem; border-radius: 6px;
          overflow-x: auto; white-space: pre-wrap; }
    .goal { background: #eef; }
    /* The prelude is collapsed by default (a <details>) and syntax-highlighted
       with the same .tok-* classes as the editor; #555 is the plain-token base. */
    .prelude-wrap { margin: .3rem 0 .6rem; }
    .prelude-wrap summary { cursor: pointer; font-weight: 600; color: #444;
                            font-size: .95rem; }
    .prelude { color: #555; font-size: .85rem; margin-top: .3rem;
               white-space: pre-wrap; overflow-wrap: break-word; }
    /* L1 editor: a transparent textarea stacked over a highlighted <pre>.
       Both share identical metrics so the coloured layer aligns with typing. */
    .editor-wrap { position: relative; }
    .editor, .editor-hl {
      margin: 0; width: 100%; box-sizing: border-box;
      font-family: ui-monospace, monospace; font-size: 1rem; line-height: 1.45;
      padding: .5rem; border: 1px solid #ccc;
      white-space: pre-wrap; overflow-wrap: break-word; tab-size: 2;
    }
    .editor {
      position: relative; z-index: 1; resize: vertical;
      color: transparent; background: transparent; caret-color: #000;
    }
    .editor-hl {
      position: absolute; inset: 0; z-index: 0; overflow: hidden;
      pointer-events: none; border-color: transparent; background: #fff;
      color: #222;
    }
    .tok-kw      { color: #8250df; font-weight: 600; }
    .tok-hole    { color: #fff; background: #d6336c; border-radius: 3px; }
    .tok-comment { color: #6a737d; font-style: italic; }
    .tok-op      { color: #0a7d62; }
    /* An error squiggle: rzk reports line-level locations, so the whole offending
       line is drawn with a wavy red underline. The line is an inline span in the
       highlight layer, so the underline tracks the text even when it wraps. */
    .hl-errline { text-decoration: underline wavy #d6336c;
                  text-decoration-skip-ink: none; text-underline-offset: .15em; }
    /* The level map lays items out as compact icon tiles (rounded squares). The
       icon names the role; the corner number and the title tooltip identify the
       item; classes carry state. This stays succinct as items multiply. */
    .levels { margin: .2rem 0 .4rem; display: flex; flex-wrap: wrap; gap: .35rem;
              align-items: flex-start; }
    .tile { position: relative; box-sizing: border-box; vertical-align: top;
            width: 2.1rem; height: 2.1rem; padding: 0; margin: 0; flex: 0 0 auto;
            display: inline-flex; align-items: center; justify-content: center;
            background: #f4f4f4; border: 1px solid #ccc; border-radius: 8px;
            color: #5b6472; cursor: pointer; }
    .tile svg { width: 1.2rem; height: 1.2rem; display: block; }
    .tile:hover { border-color: #888; }
    .tile.current { box-shadow: 0 0 0 2px #79c; border-color: #79c; }
    .tile-num { position: absolute; bottom: 0; right: .15rem; font-size: .55rem;
                line-height: 1; color: #9aa; font-variant-numeric: tabular-nums; }
    /* Roles. */
    .tile-prose   { color: #3a5a8a; background: #eef3fb; border-color: #c2d2ea; }
    .tile-pretest { color: #9a7a1a; background: #fff8e8; border-color: #ecd9a6; }
    .tile-star    { color: #b8860b; border-style: dashed; }
    /* States. */
    .tile.done, .tile.solved { background: #e7f7e7; border-color: #7c7; color: #2a7a2a; }
    .tile.solved .tile-num { color: #6a9a6a; }
    .tile.tile-locked { background: #efe6e6; border-color: #cbb4b4; color: #8a5a5a; }
    .tile.solved::after { content: "✓"; position: absolute; top: -5px; right: -5px;
        background: #2a7a2a; color: #fff; border-radius: 50%; width: .85rem;
        height: .85rem; font-size: .6rem; line-height: .85rem; text-align: center;
        font-weight: 700; }
    .progress { margin: 0 0 .8rem; font-size: .85rem; color: #777; }
    .progress.done { color: #2a7a2a; font-weight: 600; }
    .advance { margin: .5rem 0; }
    .advance button { background: #dfd; border: 1px solid #7c7; border-radius: 6px;
                      cursor: pointer; }
    .all-done { margin: .5rem 0; padding: .6rem; background: #dff5df;
                border: 1px solid #7c7; border-radius: 6px; font-weight: 600;
                color: #285028; }
    /* The control bar is a sticky footer, separated from the Moves panel so the
       controls (Check/Format/Undo/Reset) are always in the same place and never
       blend into the per-hole move buttons above. On a short viewport it simply
       sits in flow at the end, in its own bordered group. */
    .action-bar { position: sticky; bottom: 0; margin: 1rem -1rem 0;
                  padding: .5rem 1rem; background: rgba(255, 255, 255, .97);
                  border-top: 2px solid #e3e3e3;
                  box-shadow: 0 -2px 8px rgba(0, 0, 0, .07); z-index: 5; }
    .buttons { margin: .5rem 0; }
    .action-bar .buttons { margin: 0; display: flex; flex-wrap: wrap;
                           align-items: center; gap: .5rem; }
    .action-bar .buttons button { margin: 0; }
    .format-on-check { font-size: .85rem; color: #555; cursor: pointer;
                       margin-left: auto; user-select: none; }
    .actions { margin: .3rem 0; display: flex; flex-wrap: wrap; gap: .4rem; }
    button { font-size: 1rem; padding: .4rem .9rem; margin-right: .5rem; }
    /* Primary (Check) / secondary (Reset) hierarchy for the main actions. */
    .buttons button.primary { background: #2563eb; color: #fff;
                              border: 1px solid #1d4ed8; border-radius: 6px;
                              cursor: pointer; }
    .buttons button.primary:hover { background: #1d4ed8; }
    .buttons button.secondary { background: #fff; color: #444;
                                border: 1px solid #ccc; border-radius: 6px;
                                cursor: pointer; }
    .buttons button.secondary:hover { background: #f3f3f3; }
    .buttons button:disabled { color: #bbb; cursor: default; }
    .buttons button:disabled:hover { background: #fff; }
    .levels button:hover { border-color: #999; }
    .advance button:hover { background: #cfe9cf; }
    /* Linear prev / current / next navigation footer. */
    .nav { display: flex; align-items: center; justify-content: space-between;
           gap: .5rem; margin: 1.2rem 0 .3rem; padding-top: .6rem;
           border-top: 1px solid #eee; }
    .nav-current { font-weight: 600; color: #444; text-align: center;
                   flex: 0 0 auto; white-space: nowrap; }
    /* Prev/next name their target; cap their width and ellipsize long titles so
       the footer never overflows. */
    .nav button { margin: 0; background: #fff; border: 1px solid #ccc;
                  border-radius: 6px; cursor: pointer; flex: 0 1 auto;
                  max-width: 38%; overflow: hidden; text-overflow: ellipsis;
                  white-space: nowrap; }
    .nav-next { text-align: right; }
    .nav button:not(:disabled):hover { border-color: #999; }
    .nav button:disabled { color: #bbb; cursor: default; border-color: #eee; }
    /* Two-part move button: a colour-coded kind chip + a syntax-highlighted
       filler term. The button itself is a flex container with no padding; the
       two parts supply their own. */
    button.refine { display: inline-flex; align-items: stretch; gap: 0;
                    padding: 0; margin: 0; overflow: hidden;
                    background: #fff; border: 1px solid #99c; border-radius: 6px;
                    cursor: pointer; font-size: .95rem; }
    button.refine .move-kind { display: flex; align-items: center;
                    padding: .35rem .55rem; color: #fff; font-weight: 600;
                    font-family: system-ui, sans-serif; font-size: .72rem;
                    text-transform: uppercase; letter-spacing: .04em; }
    button.refine .kind-intro { background: #2a7a2a; }   /* introductions */
    button.refine .kind-give  { background: #8250df; }   /* eliminations */
    button.refine .move-term { display: flex; align-items: center;
                    padding: .35rem .6rem; color: #222;
                    font-family: ui-monospace, monospace; white-space: pre; }
    button.refine:hover { border-color: #66a;
                          box-shadow: 0 1px 3px rgba(0, 0, 0, .12); }
    .err { background: #fdd; padding: .6rem; border-radius: 6px; }
    .err p { margin: 0 0 .4rem; }
    .errdump { max-height: 14rem; overflow: auto; margin: 0;
               background: #fff3f3; font-size: .85rem; white-space: pre; }
    /* Hints: hidden by default, revealed one at a time (or auto-surfaced by a
       matching goal). Each card is a soft amber box; the reveal is a dashed
       "ask for help" affordance, distinct from the solid control buttons. */
    .hints { margin: .8rem 0; }
    .hint { background: #fffbe6; border: 1px solid #ecd98a; border-radius: 6px;
            padding: .4rem .7rem; margin: .4rem 0; }
    .hint :first-child { margin-top: 0; }
    .hint :last-child { margin-bottom: 0; }
    .hint-btn { background: #fff; border: 1px dashed #c9a83a; border-radius: 6px;
                color: #7a5c00; cursor: pointer; margin: .2rem 0 0; }
    .hint-btn:hover { background: #fffbe6; }
    /* Inventory gating: the "Allowed here" reference, and the notice when the
       proof uses a prelude lemma the level does not grant — soft amber by
       default, blocking red on a gated level. */
    .inventory-wrap { margin: .3rem 0 .6rem; }
    .inventory-wrap > summary { cursor: pointer; color: #555; font-size: .9rem; }
    .inventory { margin: .4rem 0 0; padding-left: 1.1rem;
                 font-family: ui-monospace, monospace; font-size: .85rem; color: #333; }
    .inventory li { margin: .1rem 0; }
    .gate { padding: .5rem .7rem; border-radius: 6px; margin: .4rem 0; }
    .gate p { margin: 0; }
    .gate-soft { background: #fff7e6; border: 1px solid #f0c674; color: #7a5c00; }
    .gate-hard { background: #fdecea; border: 1px solid #e0a0a0; color: #8a1c1c; }
    .ok  { background: #dfd; padding: .6rem; border-radius: 6px; }
    .ok pre { background: transparent; padding: 0; margin: 0; font-weight: 600; }
    .ok p { margin: .4rem 0 0; }
    .hole { background: #ffd; border: 1px solid #e0d28a; border-radius: 6px;
            padding: .5rem .6rem; margin: .5rem 0; }
    .hole-head { font-weight: 600; margin-bottom: .3rem; }
    .hole-panel { margin: .35rem 0; }
    .hole-label { font-size: .7rem; text-transform: uppercase;
                  letter-spacing: .04em; color: #877a3a; margin-bottom: .15rem; }
    .hole .goal { background: #eef; margin: 0; }
    .ctx { list-style: none; margin: 0; padding: 0;
           font-family: ui-monospace, monospace; font-size: .9rem; }
    .ctx .name { color: #225; }
    .ctx .type { color: #555; }
    .muted { color: #888; font-style: italic; }
    /* A thin, sticky bar that keeps level content in focus. It carries a toggle
       for the full map, the current section, and overall progress. */
    .mapbar-wrap { position: sticky; top: 0; z-index: 5; margin: 0 0 .6rem;
                   background: #fff; }
    .mapbar { display: flex; align-items: center; gap: .6rem;
              padding: .35rem 0; border-bottom: 1px solid #eee; }
    .map-toggle { background: #f0f0f0; border: 1px solid #ccc; border-radius: 6px;
                  cursor: pointer; font-size: .85rem; padding: .3rem .7rem;
                  margin: 0; white-space: nowrap; }
    .map-toggle:hover { border-color: #999; }
    .mapbar-wrap.open .map-toggle { background: #cde; border-color: #79c; }
    .mapbar-loc { flex: 1; font-weight: 600; color: #444; font-size: .9rem;
                  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mapbar-progress { font-size: .8rem; color: #888; white-space: nowrap;
                       font-variant-numeric: tabular-nums; }
    .mapbar-progress.done { color: #2a7a2a; font-weight: 600; }
    /* The full map drops below the bar only when open. */
    .mapbar-wrap .sections { margin-top: .5rem;
        animation: mapdrop .12s ease-out; }
    @keyframes mapdrop { from { opacity: 0; transform: translateY(-.25rem); }
                         to   { opacity: 1; transform: none; } }
    /* Grouped, sectioned level picker. Each section is a titled block with a
       progress count and a row of slot buttons. */
    .sections { display: flex; flex-direction: column; gap: .5rem;
                margin: .2rem 0 .4rem; }
    .section-block { border: 1px solid #eee; border-radius: 8px; padding: .4rem .5rem;
                     background: #fafafa; }
    .section-head { display: flex; align-items: baseline; justify-content: space-between;
                    gap: .5rem; margin-bottom: .35rem; }
    .section-title { font-weight: 600; color: #333; font-size: .9rem; }
    .section-count { font-size: .78rem; color: #888; font-variant-numeric: tabular-nums; }
    .section-count.done { color: #2a7a2a; font-weight: 600; }
    /* Section breadcrumb atop each slot page. */
    .breadcrumb { margin: .1rem 0 .3rem; font-size: .8rem; color: #888;
                  text-transform: none; }
    /* A standalone prose page (a text pseudo-level). */
    .prose-page { margin: .4rem 0; padding: .8rem 1rem; background: #f7f9fc;
                  border: 1px solid #e3e9f2; border-radius: 8px; }
    .viewed-note { margin: .2rem 0; color: #2a7a2a; font-size: .85rem; font-weight: 600;
                   min-height: 1.1rem; }
    .section-complete { margin: .5rem 0; padding: .5rem .7rem; background: #eafaea;
                        border: 1px solid #b9e0b9; border-radius: 6px;
                        color: #285028; font-weight: 600; }
    /* Pre-test self-assessment. */
    .pretest { margin: .5rem 0; padding: .6rem .7rem; background: #fff8e8;
               border: 1px solid #ecd9a6; border-radius: 8px; }
    .pretest-q { margin: 0 0 .4rem; font-weight: 600; color: #6a5a22; }
    .pretest-btns { display: flex; flex-wrap: wrap; gap: .5rem; }
    .pretest-btn { background: #fff; color: #444; border: 1px solid #ccc;
                   border-radius: 6px; cursor: pointer; }
    .pretest-btn:hover { border-color: #999; }
    .pretest-btn.chosen { background: #2563eb; color: #fff; border-color: #1d4ed8; }
    /* Lock panel and remediation links (shown when a prereq is "not familiar"). */
    .locked { margin: .5rem 0; padding: .7rem .8rem; background: #f7f1f1;
              border: 1px solid #e0cccc; border-radius: 8px; }
    .locked > p { margin: 0 0 .5rem; font-weight: 600; color: #7a4a4a; }
    .lock-jumps { display: flex; flex-wrap: wrap; gap: .4rem; margin: 0 0 .5rem; }
    .remedy { margin: .3rem 0 .6rem; display: flex; flex-direction: column;
              gap: .25rem; align-items: flex-start; }
    .remedy-head { margin: 0 0 .1rem; font-size: .85rem; color: #555; font-weight: 600; }
    a.remedy-link { color: #2563eb; text-decoration: none; font-size: .9rem; }
    a.remedy-link:hover { text-decoration: underline; }
    button.remedy-link { background: #eef; color: #2563eb; border: 1px solid #c2c2ea;
                         border-radius: 6px; cursor: pointer; font-size: .85rem;
                         padding: .25rem .6rem; margin: 0; }
    button.remedy-link:hover { background: #e0e0fb; }

    /* Progress controls (export / import / reset), in the level map panel. */
    .progress-controls { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center;
                         margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; }
    button.prog-btn { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db;
                      border-radius: 6px; cursor: pointer; font-size: .85rem;
                      padding: .3rem .7rem; }
    button.prog-btn:hover { background: #e5e7eb; }
    button.prog-btn.danger { color: #b91c1c; border-color: #f0c2c2; background: #fdf0f0; }
    button.prog-btn.danger:hover { background: #fbe0e0; }
    .reset-confirm { display: inline-flex; gap: .4rem; align-items: center;
                     font-size: .85rem; color: #b91c1c; }
    /* Import result banner, shown after a reload. */
    .import-msg { display: flex; justify-content: space-between; align-items: center;
                  gap: 1rem; margin: .75rem 0; padding: .6rem .9rem; border-radius: 8px;
                  font-size: .9rem; }
    .import-msg.ok  { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .import-msg.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    button.import-dismiss { background: transparent; border: none; cursor: pointer;
                            font-size: 1rem; color: inherit; padding: 0 .25rem; }
  </style>
</head>
<body>
  <script src="index.js" type="module"></script>
</body>
</html>
